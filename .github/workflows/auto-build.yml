# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: BuildCI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DROPBOX_APP_KEY: default-dropbox-app-key
      ONEDRIVE_CLIENT_ID: default-onedrive-client-id
      ONEDRIVE_AUTHORITY: https://login.microsoftonline.com/common
      REMOTELYSAVE_WEBSITE: https://remotelysave.com
      REMOTELYSAVE_CLIENT_ID: default-remotelysave-client-id
      GOOGLEDRIVE_CLIENT_ID: default-googledrive-client-id
      GOOGLEDRIVE_CLIENT_SECRET: default-googledrive-client-secret
      BOX_CLIENT_ID: default-box-client-id
      BOX_CLIENT_SECRET: default-box-client-secret
      PCLOUD_CLIENT_ID: default-pcloud-client-id
      PCLOUD_CLIENT_SECRET: default-pcloud-client-secret
      YANDEXDISK_CLIENT_ID: default-yandexdisk-client-id
      YANDEXDISK_CLIENT_SECRET: default-yandexdisk-client-secret
      KOOFR_CLIENT_ID: default-koofr-client-id
      KOOFR_CLIENT_SECRET: default-koofr-client-secret

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Checkout codes
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checkout LFS file list
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
      - name: LFS Cache
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-
      - name: Git LFS Pull
        run: git lfs pull
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: my-dist
          path: |
            main.js
            manifest.json
            styles.css
