# modified from https://github.com/argenos/nldates-obsidian/blob/master/.github/workflows/release.yml
# which is released under MIT License

# trigger:
# modify manifest.json, package.json, versions.json
# git tag <version number>
# git push origin --tags

name: Release A New Version

on:
  push:
    tags:
      - "*" # Push events to matching any tag format, i.e. 1.0, 20.15.10
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create or update
        required: true
        type: string
      draft:
        description: Create as draft release
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DROPBOX_APP_KEY: default-dropbox-app-key
      ONEDRIVE_CLIENT_ID: default-onedrive-client-id
      ONEDRIVE_AUTHORITY: https://login.microsoftonline.com/common
      REMOTELYSAVE_WEBSITE: https://remotelysave.com
      REMOTELYSAVE_CLIENT_ID: default-remotelysave-client-id
      GOOGLEDRIVE_CLIENT_ID: default-googledrive-client-id
      GOOGLEDRIVE_CLIENT_SECRET: default-googledrive-client-secret
      BOX_CLIENT_ID: default-box-client-id
      BOX_CLIENT_SECRET: default-box-client-secret
      PCLOUD_CLIENT_ID: default-pcloud-client-id
      PCLOUD_CLIENT_SECRET: default-pcloud-client-secret
      YANDEXDISK_CLIENT_ID: default-yandexdisk-client-id
      YANDEXDISK_CLIENT_SECRET: default-yandexdisk-client-secret
      KOOFR_CLIENT_ID: default-koofr-client-id
      KOOFR_CLIENT_SECRET: default-koofr-client-secret

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout codes
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checkout LFS file list
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id
      - name: LFS Cache
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-
      - name: Git LFS Pull
        run: git lfs pull
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Create Release And Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            main.js
            manifest.json
            styles.css
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          make_latest: true
